<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fetch con Node.js</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    button{
      padding: 10px 20px;
      cursor: pointer;
    }

    #resultado{
      margin-top: 20px;
      font-size: 20px;
      color: darkblue;
    }
  </style>
</head>
<body>

  <h1>Frontend simple</h1>

  <button id="btn">
    Traer datos del backend
  </button>

  <div id="resultado"></div>

  <script>

    const boton = document.getElementById("btn")
    const resultado = document.getElementById("resultado")

    boton.addEventListener("click", async () => {

      try {

        resultado.textContent = "Cargando..."

        // Request HTTP al backend Node
        const response = await fetch("http://localhost:3000/") // /

        // Convertimos respuesta a texto
        const data = await response.text()

        console.log(data)

        resultado.textContent = data

      } catch(error) {

        console.error(error)

        resultado.textContent = "Error al conectar con backend"

      }

    })

  </script>

</body>
</html>
